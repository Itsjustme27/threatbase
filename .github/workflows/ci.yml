name: CI

on:
  pull_request:
  push:
    branches: [main]

# Avoid piling up redundant runs on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking for now: the project was never run through `tsc --noEmit`
      # (Vite/esbuild skips type-checking), so there is a pre-existing backlog of
      # type errors (framer-motion variants, recharts props, implicit-any in some
      # components). This surfaces them in CI without blocking; remove
      # `continue-on-error` once the backlog is burned down.
      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
