name: HimalayaFeed — Nightly Archive Release

on:
  # Run every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger for testing or ad-hoc archiving
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    name: Create Daily Archive Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Archive
        run: |
          DATE=$(date -u '+%Y.%m.%d')
          echo "RELEASE_TAG=v${DATE}" >> $GITHUB_ENV
          
          # Create a zip archive of the current feed files
          zip himalayafeed-archive-${DATE}.zip malicious_ips.txt malicious_ips.csv

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the pre-installed GitHub CLI to create a release and upload the zip
          gh release create "${RELEASE_TAG}" \
            himalayafeed-archive-*.zip \
            --title "HimalayaFeed Archive — ${RELEASE_TAG}" \
            --notes "Daily snapshot of the HimalayaFeed threat intelligence data for ${RELEASE_TAG}."
