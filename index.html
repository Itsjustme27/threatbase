<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#080b12">

  <!-- Primary Meta Tags -->
  <title>Threatbase — Real-Time Threat Intelligence & IOC Blocklists</title>
  <meta name="description"
    content="Threatbase is an open-source threat intelligence platform tracking malicious infrastructure globally. Access real-time IOC feeds, IP blocklists, and community-driven threat reports.">
  <meta name="keywords"
    content="threat intelligence, IOC, indicators of compromise, IP blocklist, malware, phishing, cybersecurity, threat feeds, open source intelligence, OSINT, infosec, DDoS, botnet, brute force">
  <meta name="author" content="Threatbase">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://threatbase.qzz.io/">

  <!-- Favicon -->
  <link rel="icon" href="/img/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/logo.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://threatbase.qzz.io/">
  <meta property="og:title" content="Threatbase — Real-Time Threat Intelligence & IOC Blocklists">
  <meta property="og:description"
    content="Community-driven threat intelligence platform. Access real-time IOC feeds, scan IPs & domains, and deploy high-performance blocklists.">
  <meta property="og:image" content="https://threatbase.qzz.io/img/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Threatbase">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://threatbase.qzz.io/">
  <meta name="twitter:title" content="Threatbase — Real-Time Threat Intelligence & IOC Blocklists">
  <meta name="twitter:description"
    content="Open-source threat intelligence platform. Scan IPs, access IOC feeds, and deploy blocklists in real time.">
  <meta name="twitter:image" content="https://threatbase.qzz.io/img/logo.png">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Threatbase",
    "url": "https://threatbase.qzz.io",
    "description": "Community-driven threat intelligence platform providing real-time IOC feeds, IP scanning, and high-performance blocklists for cybersecurity defenders.",
    "applicationCategory": "SecurityApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "creator": {
      "@type": "Organization",
      "name": "Threatbase",
      "url": "https://threatbase.qzz.io"
    },
    "featureList": [
      "Real-time threat intelligence feeds",
      "IP and domain scanning",
      "Community-driven IOC reports",
      "High-performance blocklists",
      "Threat analytics dashboard"
    ]
  }
  </script>

  <!-- WebSite + Sitelinks Search Box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Threatbase",
    "alternateName": "Threatbase Threat Intelligence",
    "url": "https://threatbase.qzz.io/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://threatbase.qzz.io/?search={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Threatbase",
    "url": "https://threatbase.qzz.io/",
    "logo": "https://threatbase.qzz.io/img/logo.png",
    "description": "Community-driven, open-source threat intelligence platform providing real-time IOC feeds, IP and domain reputation scanning, and free blocklists.",
    "sameAs": [
      "https://github.com/kalidada18/threatbase"
    ]
  }
  </script>

  <!-- Fonts: Manrope (display + body grotesk) · JetBrains Mono (data) · Righteous (404) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Righteous&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>

  <!-- Crawlable fallback for non-JS crawlers and link discovery. Hidden once the app mounts. -->
  <noscript>
    <main>
      <h1>Threatbase — Real-Time Threat Intelligence &amp; Free IOC Blocklists</h1>
      <p>
        Threatbase is a community-driven, open-source threat intelligence platform. Scan any IP address,
        domain, URL, or file hash against continuously updated indicators of compromise (IOCs), and deploy
        high-performance blocklists to your firewalls, IDS/IPS, and SIEM — completely free.
      </p>
      <h2>What you can do with Threatbase</h2>
      <ul>
        <li>Check whether an IP address or domain is malicious in real time</li>
        <li>Download free IPv4, IPv6, domain, URL, hash, and CIDR blocklists</li>
        <li>Report malicious infrastructure to the community threat feed</li>
        <li>Track global threat trends across millions of indicators</li>
      </ul>
      <h2>Explore</h2>
      <ul>
        <li><a href="/report">Report a malicious IP</a></li>
        <li><a href="/contributors">Top community contributors</a></li>
        <li><a href="/about">About Threatbase</a></li>
        <li><a href="/policy">Reporting policy</a></li>
      </ul>
      <p>Sourced from Spamhaus, FireHOL, Emerging Threats, Abuse.ch, SANS DShield, and the wider infosec community.</p>
    </main>
  </noscript>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
